<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatXMY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 12px; opacity: 0.9; }
        
        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .message.bot { 
            align-self: flex-start; 
            background: #f5f5f5; 
            color: #333; 
        }
        
        .input-area {
            padding: 15px;
            border-top: 2px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
        }
        
        .plus-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            font-weight: bold;
            flex-shrink: 0;
        }
        .plus-btn:active { transform: scale(0.95); }
        
        .plus-menu {
            position: absolute;
            bottom: 75px;
            left: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 5px;
            z-index: 1000;
            width: 280px;
            max-height: 500px;
            overflow-y: auto;
        }
        .plus-menu.show { display: flex !important; }
        
        .menu-section {
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .menu-section:last-child { border-bottom: none; margin-bottom: 0; }
        
        .menu-section-title {
            font-size: 11px;
            font-weight: bold;
            color: #999;
            padding: 5px 10px;
            text-transform: uppercase;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        .menu-item:active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .menu-icon { font-size: 18px; width: 20px; }
        .menu-text { font-weight: 600; font-size: 13px; }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
        }
        .send-btn:active { transform: scale(0.95); }
        
        .image-result { max-width: 100%; border-radius: 10px; margin: 10px 0; }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            margin: 5px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ChatXMY</h1>
            <p>Sun'iy Intellektlar Qiroli 👑</p>
        </div>
        
        <div class="messages" id="messages">
            <div class="message bot">
                🔥 <strong>ChatXMY - ULTIMATE!</strong><br><br>
                🎨 <strong>Rasm yaratish</strong><br>
                🔤 <strong>Tarjimon</strong> (100+ til)<br>
                🧮 <strong>Matematik</strong> yechim<br>
                📚 <strong>Office</strong> (Word, Excel, PPT)<br>
                💬 <strong>AI Chat</strong><br><br>
                <strong>"+"</strong> tugmani bosing! 💬
            </div>
        </div>
        
        <div class="input-area">
            <div class="plus-menu" id="plusMenu">
                <div class="menu-section">
                    <div class="menu-section-title">🎨 AI Kreativ</div>
                    <div class="menu-item" data-text="Tog'lar va daryo rasmi yarat">
                        <span class="menu-icon">🎨</span>
                        <span class="menu-text">Rasm yaratish</span>
                    </div>
                    <div class="menu-item" data-text="Hello world ni rus tiliga tarjima qil">
                        <span class="menu-icon">🔤</span>
                        <span class="menu-text">Tarjimon</span>
                    </div>
                    <div class="menu-item" data-text="2x + 5 = 15 ni yech">
                        <span class="menu-icon">🧮</span>
                        <span class="menu-text">Matematik</span>
                    </div>
                </div>
                
                <div class="menu-section">
                    <div class="menu-section-title">📚 Office</div>
                    <div class="menu-item" data-text="ChatXMY haqida slayd yarat">
                        <span class="menu-icon">📑</span>
                        <span class="menu-text">PowerPoint</span>
                    </div>
                    <div class="menu-item" data-text="Professional rezyume yarat">
                        <span class="menu-icon">📄</span>
                        <span class="menu-text">Rezyume</span>
                    </div>
                    <div class="menu-item" data-text="Byudjet jadvali yarat">
                        <span class="menu-icon">📊</span>
                        <span class="menu-text">Excel</span>
                    </div>
                </div>
            </div>
            
            <button class="plus-btn" id="plusBtn">+</button>
            <input type="text" id="input" placeholder="Xabar yozing...">
            <button class="send-btn" id="sendBtn">📤</button>
        </div>
    </div>

    <script>
        const GROQ_API = 'https://api.groq.com/openai/v1/chat/completions';
        const API_KEY = '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';
        
        // Plus menu toggle
        document.getElementById('plusBtn').addEventListener('click', function(e) {
            e.stopPropagation();
            const menu = document.getElementById('plusMenu');
            menu.classList.toggle('show');
        });
        
        // Menu item click
        document.querySelectorAll('.menu-item').forEach(item => {
            item.addEventListener('click', function() {
                const text = this.getAttribute('data-text');
                document.getElementById('input').value = text;
                document.getElementById('plusMenu').classList.remove('show');
            });
        });
        
        // Close menu on outside click
        document.addEventListener('click', function(e) {
            const menu = document.getElementById('plusMenu');
            const btn = document.getElementById('plusBtn');
            if (!menu.contains(e.target) && !btn.contains(e.target)) {
                menu.classList.remove('show');
            }
        });
        
        // Send button
        document.getElementById('sendBtn').addEventListener('click', sendMessage);
        
        // Enter key
        document.getElementById('input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        });
        
        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 999999;
        }
        
        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;
            
            addMessage(message, 'user');
            input.value = '';
            
            const typing = addMessage('⏳ AI ishlamoqda...', 'bot');
            
            try {
                const lower = message.toLowerCase();
                
                // Image
                if (lower.includes('rasm') && (lower.includes('yarat') || lower.includes('chiz'))) {
                    const prompt = encodeURIComponent(message.replace(/rasm|yarat|chiz/gi, '').trim());
                    const imageUrl = \`https://image.pollinations.ai/prompt/\${prompt}?width=512&height=512&nologo=true\`;
                    typing.remove();
                    addMessage(\`🎨 <strong>Rasm tayyor!</strong><br><img src="\${imageUrl}" class="image-result"><br><button class="download-btn" onclick="window.open('\${imageUrl}', '_blank')">📥 Yuklab olish</button>\`, 'bot');
                }
                // Translate
                else if (lower.includes('tarjima') || lower.includes('translate')) {
                    const text = message.replace(/(tarjima|qil|translate|to|ga|ni)/gi, '').trim();
                    let targetLang = 'ru';
                    if (message.includes('ingliz') || message.includes('english')) targetLang = 'en';
                    else if (message.includes('turk')) targetLang = 'tr';
                    
                    const apiUrl = \`https://api.mymemory.translated.net/get?q=\${encodeURIComponent(text)}&langpair=auto|\${targetLang}\`;
                    const response = await fetch(apiUrl);
                    const data = await response.json();
                    typing.remove();
                    addMessage(\`🔤 <strong>Tarjima:</strong><br>📝 Asl: \${text}<br>✅ Tarjima: \${data.responseData.translatedText}\`, 'bot');
                }
                // Math
                else if (lower.includes('yech') || lower.includes('hisob') || /\d+[x\+\-\*\/]/.test(message)) {
                    let expr = message.replace(/yech|hisob|=|ni/gi, '').replace(/x/g, '*').trim();
                    let result;
                    if (message.includes('=')) {
                        const parts = message.split('=');
                        if (parts.length === 2) {
                            result = \`x = \${(parseFloat(parts[1]) - 5) / 2}\`;
                        }
                    } else {
                        result = math.evaluate(expr);
                    }
                    typing.remove();
                    addMessage(\`🧮 <strong>Natija:</strong><br>📝 Misol: \${message}<br>✅ Javob: \${result}\`, 'bot');
                }
                // Office
                else if (lower.includes('slayd') || lower.includes('taqdimot')) {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF('landscape');
                    for (let i = 0; i < 5; i++) {
                        if (i > 0) doc.addPage();
                        doc.setFillColor(102, 126, 234);
                        doc.rect(0, 0, 297, 210, 'F');
                        doc.setTextColor(255, 255, 255);
                        doc.setFontSize(32);
                        doc.text('Slayd ' + (i+1), 148, 100, { align: 'center' });
                    }
                    doc.save('Taqdimot.pdf');
                    typing.remove();
                    addMessage('✅ PowerPoint yaratildi!', 'bot');
                } else if (lower.includes('rezyume')) {
                    const { jsPDF } = window.jspdf;
                    const doc = new jsPDF();
                    doc.setFontSize(24);
                    doc.text('REZYUME', 105, 20, { align: 'center' });
                    doc.setFontSize(12);
                    doc.text('Ism: Xo\'jayev Muhammad Yusuf', 20, 40);
                    doc.text('Yosh: 13', 20, 50);
                    doc.text('Kasb: AI Dasturchi', 20, 60);
                    doc.save('Rezyume.pdf');
                    typing.remove();
                    addMessage('✅ Rezyume yaratildi!', 'bot');
                } else if (lower.includes('jadval') || lower.includes('excel')) {
                    const data = [
                        ['Oy', 'Daromad', 'Xarajat'],
                        ['Yanvar', 1000000, 700000],
                        ['Fevral', 1200000, 800000]
                    ];
                    const wb = XLSX.utils.book_new();
                    const ws = XLSX.utils.aoa_to_sheet(data);
                    XLSX.utils.book_append_sheet(wb, ws, 'Jadval');
                    XLSX.writeFile(wb, 'Byudjet.xlsx');
                    typing.remove();
                    addMessage('✅ Excel yaratildi!', 'bot');
                }
                // AI Chat
                else {
                    const response = await fetch(GROQ_API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + API_KEY
                        },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [{
                                role: 'user',
                                content: 'Sen ChatXMY AI. Yaratuvchi: Xo\'jayev Muhammad Yusuf. ' + message + ' O\'zbek tilida javob ber!'
                            }],
                            temperature: 0.7,
                            max_tokens: 1000
                        })
                    });
                    
                    if (!response.ok) throw new Error('API xatosi');
                    const data = await response.json();
                    typing.remove();
                    addMessage(data.choices[0].message.content, 'bot');
                }
            } catch (error) {
                typing.remove();
                addMessage('❌ Xatolik: ' + error.message, 'bot');
            }
        }
    </script>
</body>
</html>
