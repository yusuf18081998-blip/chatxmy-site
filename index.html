<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatXMY AI Ultimate</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 12px 20px;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 14px;
            word-wrap: break-word;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .message.bot { 
            align-self: flex-start; 
            background: #f5f5f5; 
            color: #333; 
        }
        .doc-preview {
            background: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            padding: 15px;
            margin: 10px 0;
        }
        .doc-preview h4 {
            color: #667eea;
            margin-bottom: 10px;
        }
        .slide-preview {
            background: #f9f9f9;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            border-left: 3px solid #667eea;
        }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            text-decoration: none;
            margin: 5px;
            cursor: pointer;
            border: none;
            font-weight: 600;
        }
        .download-btn:hover { opacity: 0.9; }
        .input-area {
            padding: 12px 15px;
            border-top: 2px solid #eee;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        button {
            padding: 12px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
        }
        .typing {
            display: inline-block;
            padding: 10px 15px;
            background: #f0f0f0;
            border-radius: 10px;
        }
        .typing::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }
        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 style="font-size: 20px;">🚀 ChatXMY AI Ultimate</h1>
                <p style="font-size: 10px; opacity: 0.9;">AI Chat + Office Generator</p>
            </div>
        </div>
        <div class="messages" id="messages">
            <div class="message bot">
                🎉 <strong>ChatXMY AI Ultimate!</strong><br><br>
                Nima yaratmoqchisiz?<br><br>
                <strong>Misollar:</strong><br>
                📑 "Python haqida 5 ta slayd yarat"<br>
                📄 "Men haqimda rezyume yoz"<br>
                📊 "Oy davomida xarajat jadvali"<br>
                📕 "Yutuq sertifikati yarat"<br><br>
                Savol bering! 💬
            </div>
        </div>
        <div class="input-area">
            <input type="text" id="input" placeholder="Masalan: Python haqida 5 ta slayd yarat..." onkeypress="if(event.key==='Enter') sendMessage()">
            <button onclick="sendMessage()">📤</button>
        </div>
    </div>

    <script>
        const GROQ_API = 'https://api.groq.com/openai/v1/chat/completions';
        const API_KEY = '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';

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 999999;
            return div;
        }

        async function sendMessage() {
            const input = document.getElementById('input');
            const message = input.value.trim();
            if (!message) return;

            addMessage(message, 'user');
            input.value = '';

            const typing = addMessage('<span class="typing">AI o\'ylayapti</span>', 'bot');

            try {
                // Detect document type
                const lower = message.toLowerCase();
                
                if (lower.includes('slayd') || lower.includes('taqdimot') || lower.includes('powerpoint') || lower.includes('ppt')) {
                    await handlePowerPoint(message, typing);
                } else if (lower.includes('rezyume') || lower.includes('cv') || lower.includes('resume')) {
                    await handleResume(message, typing);
                } else if (lower.includes('jadval') || lower.includes('excel') || lower.includes('xls')) {
                    await handleExcel(message, typing);
                } else if (lower.includes('sertifikat') || lower.includes('certificate')) {
                    await handleCertificate(message, typing);
                } else {
                    // Regular AI chat
                    await handleChat(message, typing);
                }
            } catch (error) {
                typing.remove();
                addMessage('❌ Xatolik yuz berdi. Qayta urinib ko\'ring!<br><small>' + error.message + '</small>', 'bot');
            }
        }

        async function handlePowerPoint(message, typing) {
            // Get AI to generate slide content
            const aiPrompt = `Foydalanuvchi so'radi: "${message}". 
                Slayd taqdimoti uchun mazmun yarat. Har bir slayd uchun:
                - Sarlavha
                - 3-4 ta asosiy nuqta
                JSON formatda qaytaring:
                {"slides": [{"title": "...", "points": ["...", "..."]}]}
                FAQAT JSON, boshqa hech narsa yo'q!`;

            const aiResponse = await callGroqAPI(aiPrompt);
            typing.remove();

            try {
                const data = JSON.parse(aiResponse);
                const slides = data.slides || [];

                // Show preview
                let preview = '<div class="doc-preview"><h4>📑 Taqdimot tayyor!</h4>';
                slides.forEach((slide, i) => {
                    preview += `<div class="slide-preview"><strong>Slayd ${i+1}: ${slide.title}</strong><br>`;
                    slide.points.forEach(p => preview += `• ${p}<br>`);
                    preview += '</div>';
                });
                preview += '<button class="download-btn" onclick="downloadPPT(\'' + 
                    encodeURIComponent(JSON.stringify(slides)) + '\')">📥 PowerPoint Yuklab olish</button></div>';
                
                addMessage(preview, 'bot');
            } catch (e) {
                // Fallback
                createSimplePPT(message);
                addMessage('✅ Taqdimot yaratildi!<br><button class="download-btn" onclick="downloadSimplePPT()">📥 Yuklab olish</button>', 'bot');
            }
        }

        async function handleResume(message, typing) {
            const aiPrompt = `Foydalanuvchi so'radi: "${message}". 
                Professional rezyume yarat. JSON formatda:
                {"name": "Ism", "age": "13", "position": "Kasb", "skills": ["skill1", "skill2"], "experience": ["exp1"]}`;

            const aiResponse = await callGroqAPI(aiPrompt);
            typing.remove();

            createResumePDF();
            addMessage('✅ Rezyume yaratildi!<br><button class="download-btn" onclick="downloadResume()">📥 PDF Yuklab olish</button>', 'bot');
        }

        async function handleExcel(message, typing) {
            typing.remove();
            createExcelTable(message);
            addMessage('✅ Excel jadval yaratildi!<br><button class="download-btn" onclick="downloadExcel()">📥 Excel Yuklab olish</button>', 'bot');
        }

        async function handleCertificate(message, typing) {
            typing.remove();
            createCertificate();
            addMessage('✅ Sertifikat yaratildi!<br><button class="download-btn" onclick="downloadCert()">📥 PDF Yuklab olish</button>', 'bot');
        }

        async function handleChat(message, typing) {
            const aiResponse = await callGroqAPI(message);
            typing.remove();
            addMessage(aiResponse, 'bot');
        }

        async function callGroqAPI(prompt) {
            const response = await fetch(GROQ_API, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + API_KEY
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: [{
                        role: 'user',
                        content: prompt + ' O\'ZBEK TILIDA javob ber!'
                    }],
                    temperature: 0.7,
                    max_tokens: 1000
                })
            });

            if (!response.ok) throw new Error('API xatosi');
            
            const data = await response.json();
            return data.choices[0].message.content;
        }

        // PowerPoint
        window.downloadPPT = function(slidesData) {
            const slides = JSON.parse(decodeURIComponent(slidesData));
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');

            slides.forEach((slide, i) => {
                if (i > 0) doc.addPage();
                
                doc.setFillColor(102, 126, 234);
                doc.rect(0, 0, 297, 210, 'F');
                
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(28);
                doc.text(slide.title, 148, 60, { align: 'center' });
                
                doc.setFontSize(14);
                let y = 90;
                slide.points.forEach(point => {
                    doc.text('• ' + point, 30, y);
                    y += 15;
                });
            });

            doc.save('Taqdimot.pdf');
        };

        function createSimplePPT(message) {
            window.simplePPTData = message;
        }

        window.downloadSimplePPT = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            for (let i = 0; i < 5; i++) {
                if (i > 0) doc.addPage();
                doc.setFillColor(102, 126, 234);
                doc.rect(0, 0, 297, 210, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(32);
                doc.text('Slayd ' + (i+1), 148, 100, { align: 'center' });
            }
            doc.save('Taqdimot.pdf');
        };

        // Resume
        function createResumePDF() {
            window.resumeData = true;
        }

        window.downloadResume = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            doc.setFontSize(24);
            doc.text('REZYUME', 105, 20, { align: 'center' });
            doc.setFontSize(12);
            doc.text('Ism: Xo\'jayev Muhammad Yusuf', 20, 40);
            doc.text('Yosh: 13', 20, 50);
            doc.text('Maktab: 45-maktab, O\'zbekiston tumani', 20, 60);
            doc.text('Kasb: Dasturchi', 20, 70);
            
            doc.setFontSize(14);
            doc.text('Ko\'nikmalar:', 20, 90);
            doc.text('• JavaScript, HTML, CSS, Python', 25, 100);
            doc.text('• AI/ML, ChatXMY yaratuvchisi', 25, 110);
            doc.text('• Git, GitHub', 25, 120);
            
            doc.save('Rezyume.pdf');
        };

        // Excel
        function createExcelTable(message) {
            window.excelData = message;
        }

        window.downloadExcel = function() {
            const data = [
                ['Oy', 'Daromad', 'Xarajat', 'Tejash'],
                ['Yanvar', 1000000, 700000, 300000],
                ['Fevral', 1200000, 800000, 400000],
                ['Mart', 1100000, 750000, 350000]
            ];
            
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(data);
            XLSX.utils.book_append_sheet(wb, ws, 'Jadval');
            XLSX.writeFile(wb, 'Jadval.xlsx');
        };

        // Certificate
        function createCertificate() {
            window.certData = true;
        }

        window.downloadCert = function() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('landscape');
            
            doc.setFillColor(102, 126, 234);
            doc.rect(10, 10, 277, 190, 'D');
            
            doc.setFontSize(36);
            doc.text('SERTIFIKAT', 148, 60, { align: 'center' });
            
            doc.setFontSize(18);
            doc.text('Xo\'jayev Muhammad Yusuf', 148, 100, { align: 'center' });
            doc.text('ChatXMY AI platformasini yaratgani uchun', 148, 120, { align: 'center' });
            doc.text(new Date().toLocaleDateString(), 148, 160, { align: 'center' });
            
            doc.save('Sertifikat.pdf');
        };
    </script>
</body>
</html>
