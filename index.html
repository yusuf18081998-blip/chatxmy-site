<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatXMY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }
        .container {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 900px;
            height: 92vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 20px;
            border-radius: 20px 20px 0 0;
            text-align: center;
        }
        .header h1 { font-size: 24px; margin-bottom: 5px; }
        .header p { font-size: 12px; opacity: 0.9; }
        
        .messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 14px;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .message.bot { 
            align-self: flex-start; 
            background: #f5f5f5; 
            color: #333; 
        }
        
        .input-area {
            padding: 15px;
            border-top: 2px solid #eee;
            display: flex;
            gap: 10px;
            align-items: center;
            position: relative;
        }
        
        .plus-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        
        .plus-menu {
            position: absolute;
            bottom: 75px;
            left: 15px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            padding: 10px;
            width: 280px;
            max-height: 500px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }
        .plus-menu.active { display: block !important; }
        
        .menu-section {
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 5px;
            margin-bottom: 5px;
        }
        .menu-section:last-child { border-bottom: none; }
        
        .menu-section-title {
            font-size: 11px;
            font-weight: bold;
            color: #999;
            padding: 5px 10px;
            text-transform: uppercase;
        }
        
        .menu-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            background: white;
        }
        .menu-item:active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .menu-icon { font-size: 18px; }
        .menu-text { font-weight: 600; font-size: 13px; }
        
        input[type="text"] {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 25px;
            font-size: 14px;
            outline: none;
        }
        
        .send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .image-result { max-width: 100%; border-radius: 10px; margin: 10px 0; }
        .download-btn {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            margin: 5px;
            cursor: pointer;
            border: none;
            font-weight: 600;
            font-size: 12px;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 ChatXMY</h1>
            <p>Sun'iy Intellektlar Qiroli 👑</p>
        </div>
        
        <div class="messages" id="messages">
            <div class="message bot">
                🔥 <strong>ChatXMY - ULTIMATE!</strong><br><br>
                🎨 <strong>Rasm yaratish</strong><br>
                🔤 <strong>Tarjimon</strong> (100+ til)<br>
                🧮 <strong>Matematik</strong> yechim<br>
                📚 <strong>Office</strong> (Word, Excel, PPT)<br>
                💬 <strong>AI Chat</strong><br><br>
                <strong>"+"</strong> tugmani bosing! 💬
            </div>
        </div>
        
        <div class="input-area">
            <div class="plus-menu" id="menu">
                <div class="menu-section">
                    <div class="menu-section-title">🎨 AI Kreativ</div>
                    <div class="menu-item" onclick="selectPrompt('Tog\'lar va daryo rasmi yarat')">
                        <span class="menu-icon">🎨</span>
                        <span class="menu-text">Rasm yaratish</span>
                    </div>
                    <div class="menu-item" onclick="selectPrompt('Hello world ni rus tiliga tarjima qil')">
                        <span class="menu-icon">🔤</span>
                        <span class="menu-text">Tarjimon</span>
                    </div>
                    <div class="menu-item" onclick="selectPrompt('2x + 5 = 15 ni yech')">
                        <span class="menu-icon">🧮</span>
                        <span class="menu-text">Matematik</span>
                    </div>
                </div>
                
                <div class="menu-section">
                    <div class="menu-section-title">📚 Office</div>
                    <div class="menu-item" onclick="selectPrompt('ChatXMY haqida slayd yarat')">
                        <span class="menu-icon">📑</span>
                        <span class="menu-text">PowerPoint</span>
                    </div>
                    <div class="menu-item" onclick="selectPrompt('Professional rezyume yarat')">
                        <span class="menu-icon">📄</span>
                        <span class="menu-text">Rezyume</span>
                    </div>
                    <div class="menu-item" onclick="selectPrompt('Byudjet jadvali yarat')">
                        <span class="menu-icon">📊</span>
                        <span class="menu-text">Excel</span>
                    </div>
                </div>
            </div>
            
            <button class="plus-btn" onclick="toggleMenu()">+</button>
            <input type="text" id="userInput" placeholder="Xabar yozing..." onkeypress="if(event.key==='Enter') send()">
            <button class="send-btn" onclick="send()">📤</button>
        </div>
    </div>

    <script>
        const API = 'https://api.groq.com/openai/v1/chat/completions';
        const KEY = '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';
        
        function toggleMenu() {
            var menu = document.getElementById('menu');
            if (menu.classList.contains('active')) {
                menu.classList.remove('active');
            } else {
                menu.classList.add('active');
            }
        }
        
        function selectPrompt(text) {
            document.getElementById('userInput').value = text;
            document.getElementById('menu').classList.remove('active');
        }
        
        function addMsg(text, type) {
            var div = document.createElement('div');
            div.className = 'message ' + type;
            div.innerHTML = text;
            document.getElementById('messages').appendChild(div);
            document.getElementById('messages').scrollTop = 999999;
            return div;
        }
        
        async function send() {
            var input = document.getElementById('userInput');
            var msg = input.value.trim();
            if (!msg) return;
            
            addMsg(msg, 'user');
            input.value = '';
            
            var typing = addMsg('⏳ AI ishlamoqda...', 'bot');
            
            try {
                var lower = msg.toLowerCase();
                
                // Rasm
                if (lower.includes('rasm') && (lower.includes('yarat') || lower.includes('chiz'))) {
                    var prompt = encodeURIComponent(msg.replace(/rasm|yarat|chiz/gi, '').trim());
                    var imgUrl = 'https://image.pollinations.ai/prompt/' + prompt + '?width=512&height=512&nologo=true';
                    typing.remove();
                    addMsg('🎨 <strong>Rasm tayyor!</strong><br><img src="' + imgUrl + '" class="image-result"><br><a href="' + imgUrl + '" target="_blank" class="download-btn">📥 Yuklab olish</a>', 'bot');
                }
                // Tarjima
                else if (lower.includes('tarjima') || lower.includes('translate')) {
                    var text = msg.replace(/(tarjima|qil|translate|to|ga|ni)/gi, '').trim();
                    var lang = 'ru';
                    if (msg.includes('ingliz') || msg.includes('english')) lang = 'en';
                    
                    var url = 'https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=auto|' + lang;
                    var res = await fetch(url);
                    var data = await res.json();
                    typing.remove();
                    addMsg('🔤 <strong>Tarjima:</strong><br>📝 Asl: ' + text + '<br>✅ Tarjima: ' + data.responseData.translatedText, 'bot');
                }
                // Matematik
                else if (lower.includes('yech') || lower.includes('hisob') || /\d+[x\+\-\*\/]/.test(msg)) {
                    var expr = msg.replace(/yech|hisob|=|ni/gi, '').replace(/x/g, '*').trim();
                    var result;
                    if (msg.includes('=')) {
                        var parts = msg.split('=');
                        if (parts.length === 2) {
                            result = 'x = ' + ((parseFloat(parts[1]) - 5) / 2);
                        }
                    } else {
                        result = math.evaluate(expr);
                    }
                    typing.remove();
                    addMsg('🧮 <strong>Natija:</strong><br>📝 Misol: ' + msg + '<br>✅ Javob: ' + result, 'bot');
                }
                // Office
                else if (lower.includes('slayd')) {
                    var doc = new jsPDF.jsPDF('landscape');
                    for (var i = 0; i < 5; i++) {
                        if (i > 0) doc.addPage();
                        doc.setFillColor(102, 126, 234);
                        doc.rect(0, 0, 297, 210, 'F');
                        doc.setTextColor(255, 255, 255);
                        doc.setFontSize(32);
                        doc.text('Slayd ' + (i+1), 148, 100, { align: 'center' });
                    }
                    doc.save('Taqdimot.pdf');
                    typing.remove();
                    addMsg('✅ PowerPoint yaratildi!', 'bot');
                } else if (lower.includes('rezyume')) {
                    var doc = new jsPDF.jsPDF();
                    doc.setFontSize(24);
                    doc.text('REZYUME', 105, 20, { align: 'center' });
                    doc.setFontSize(12);
                    doc.text('Ism: Xo\'jayev Muhammad Yusuf', 20, 40);
                    doc.text('Yosh: 13', 20, 50);
                    doc.save('Rezyume.pdf');
                    typing.remove();
                    addMsg('✅ Rezyume yaratildi!', 'bot');
                } else if (lower.includes('jadval') || lower.includes('excel')) {
                    var data = [
                        ['Oy', 'Daromad', 'Xarajat'],
                        ['Yanvar', 1000000, 700000]
                    ];
                    var wb = XLSX.utils.book_new();
                    var ws = XLSX.utils.aoa_to_sheet(data);
                    XLSX.utils.book_append_sheet(wb, ws, 'Jadval');
                    XLSX.writeFile(wb, 'Byudjet.xlsx');
                    typing.remove();
                    addMsg('✅ Excel yaratildi!', 'bot');
                }
                // AI Chat
                else {
                    var response = await fetch(API, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + KEY
                        },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [{
                                role: 'user',
                                content: 'Sen ChatXMY AI. Yaratuvchi: Xo\'jayev Muhammad Yusuf, 13 yosh. ' + msg + ' O\'zbek tilida javob ber!'
                            }],
                            temperature: 0.7,
                            max_tokens: 1000
                        })
                    });
                    
                    var result = await response.json();
                    typing.remove();
                    addMsg(result.choices[0].message.content, 'bot');
                }
            } catch (e) {
                typing.remove();
                addMsg('❌ Xatolik: ' + e.message, 'bot');
            }
        }
    </script>
</body>
</html>
