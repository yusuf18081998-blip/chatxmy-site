<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatXMY - Kirish</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 36px;
            margin-bottom: 10px;
        }
        .logo p { color: #666; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input:focus, .form-group select:focus {
            border-color: #667eea;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { transform: translateY(-2px); }
        .error {
            background: #ffe6e6;
            color: #d8000c;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            display: none;
        }
        .info-text {
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>🤖 ChatXMY</h1>
            <p>AI Yordamchi + Internet</p>
        </div>
        <div class="error" id="error"></div>
        <form id="loginForm">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" id="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label>🌍 Davlat</label>
                <select id="country" required>
                    <option value="">Tanlang...</option>
                    <option value="UZ">🇺🇿 O'zbekiston</option>
                    <option value="KZ">🇰🇿 Qozog'iston</option>
                    <option value="RU">🇷🇺 Rossiya</option>
                    <option value="US">🇺🇸 AQSH</option>
                    <option value="TR">🇹🇷 Turkiya</option>
                </select>
            </div>
            <div class="form-group">
                <label>🗣️ Til</label>
                <select id="language" required>
                    <option value="">Tanlang...</option>
                    <option value="uz">O'zbek</option>
                    <option value="ru">Русский</option>
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                </select>
            </div>
            <button type="submit" class="btn">Kirish</button>
        </form>
        <div class="info-text">Ma'lumotlaringiz xavfsiz 🔒</div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const country = document.getElementById('country').value;
            const language = document.getElementById('language').value;
            
            if (!email || !country || !language) {
                document.getElementById('error').textContent = '❌ Barcha maydonlarni to\'ldiring!';
                document.getElementById('error').style.display = 'block';
                return;
            }
            
            localStorage.setItem('chatxmy_user', JSON.stringify({email, country, language}));
            localStorage.setItem('chatxmy_logged_in', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
